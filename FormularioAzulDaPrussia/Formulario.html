<!-- Este é um exemplo de formulário de login estilizado com a paleta de cores da Prússia Azul, utilizando Bootstrap para uma estrutura responsiva e moderna. O design inclui um fundo escuro, elementos translúcidos e detalhes em dourado para criar um visual elegante e profissional. -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Azul da Prússia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Definindo as cores da paleta */
        :root {
            --prussian-blue: #003153;
            --gold-accent: #E1AD01;
            --off-white: #F5F5F5;
        }

        body {
            background-color: var(--prussian-blue);
            color: var(--off-white);
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.05); /* Fundo levemente translúcido */
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Efeito moderno de vidro */
        }

        .btn-custom {
            background-color: var(--gold-accent);
            color: var(--prussian-blue);
            font-weight: bold;
            border: none;
        }

        .btn-custom:hover {
            background-color: #c99a01;
            color: #fff;
        }

        .text-gold {
            color: var(--gold-accent);
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-lg text-center">
                <h2 class="mb-4 text-gold">Acesso Restrito</h2>
                <p class="mb-4">Bem-vindo ao sistema. Utilize suas credenciais para continuar.</p>
                
                <form>
                    <div class="mb-3 text-start">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" placeholder="seu@email.com">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4 small">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Lembrar-me</label>
                        </div>
                        <a href="#" class="text-gold text-decoration-none">Esqueci a senha</a>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 py-2">ENTRAR</button>
                </form>
                
                <div class="mt-4 small">
                    <p>Não tem conta? <a href="#" class="text-gold">Solicitar acesso</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
