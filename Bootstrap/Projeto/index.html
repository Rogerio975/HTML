<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra de Navegação Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <!-- Logo / Nome -->
            <a class="navbar-brand" href="#">Minha Empresa</a>

            <!-- Botão Mobile -->
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuNavbar"
                aria-controls="menuNavbar"
                aria-expanded="false"
                aria-label="Alternar navegação"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menus -->
            <div class="collapse navbar-collapse" id="menuNavbar">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Início</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Quem Somos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contato</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Localização</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link btn btn-primary text-white px-3 ms-lg-2" href="#">
                            Acesso Restrito
                        </a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <main class="container py-5">
        <div class="p-5 mb-4 bg-light rounded-3 shadow-sm">
            <h1 class="display-5 fw-bold">Bem-vindo à Minha Empresa</h1>
            <p class="col-md-8 fs-5">
                Use esta área para apresentar sua empresa, serviços ou uma chamada para ação.
            </p>
            <a class="btn btn-primary btn-lg" href="#" role="button">Saiba mais</a>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
