<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boas-vindas</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #4f46e5, #9333ea);
  }

  .card {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    text-align: center;
    width: 90%;
    max-width: 380px;
  }

  .card h1 {
    margin-top: 0;
    color: #333;
    font-size: 22px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 16px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
  }

  input:focus {
    outline: none;
    border-color: #6d28d9;
  }

  button {
    width: 100%;
    padding: 12px;
    background-color: #6d28d9;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  button:hover {
    background-color: #5b21b6;
  }

  #saudacao {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #4f46e5;
    min-height: 24px;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>Qual é o seu nome?</h1>
    <input type="text" id="nomeInput" placeholder="Digite seu nome">
    <button onclick="mostrarSaudacao()">Entrar</button>
    <p id="saudacao"></p>
  </div>

  <script>
    function mostrarSaudacao() {
      const nome = document.getElementById('nomeInput').value.trim();
      const saudacaoEl = document.getElementById('saudacao');

      if (nome === '') {
        saudacaoEl.textContent = 'Por favor, digite um nome.';
        saudacaoEl.style.color = '#dc2626';
        return;
      }

      const hora = new Date().getHours();
      let periodo = 'Boa tarde';
      if (hora < 12) periodo = 'Bom dia';
      else if (hora >= 18) periodo = 'Boa noite';

      saudacaoEl.style.color = '#4f46e5';
      saudacaoEl.textContent = `${periodo}, ${nome}! Seja bem-vindo(a).`;
    }

    // Permite pressionar Enter para enviar
    document.getElementById('nomeInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') mostrarSaudacao();
    });
  </script>

</body>
</html>
